schema_version: 1

context:
  name: "mnelab"
  version: "1.4.4"
  python_min: "3.12"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 5e0cbd02dc98e4b265cadbd4f9abd4f05e882b524c02552c36fb6e438579b8c9

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - mnelab = mnelab.__main__:main
    use_python_app_entrypoint: true

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - if: osx
      then:
        - python.app
        - pyobjc-framework-cocoa >=10.0
    - black >=25.11.0
    - edfio >=0.4.10
    - isort >=7.0.0
    - matplotlib-base >=3.8.0
    - mne-base >=1.10.2
    - mne-qt-browser >=0.6.2
    - numpy >=2.0.0
    - scipy >=1.14.1
    - pyxdf >=1.16.4
    - pyside6 >=6.9.3
    - scikit-learn >=1.3.0
    - python-picard >=0.8.0
    - pybv >=0.7.4
    - pybvrf >=0.1.0
    - onnx >=1.20.0

tests:
  - python:
      imports:
        - mnelab
        - mnelab.utils
      python_version: ${{ python_min }}.*
      pip_check: true

  - script:
      - python -c "import mnelab; assert mnelab.__version__ == '${{ version }}', mnelab.__version__"
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/cbrnr/mnelab
  repository: https://github.com/cbrnr/mnelab
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Graphical user interface (GUI) for MNE, a Python-based toolbox for EEG/MEG analysis.

extra:
  recipe-maintainers:
    - larsoner
    - hoechenberger
